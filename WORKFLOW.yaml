name: K6 Load Test Pipeline

on:
  push:
    branches:
      - main

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install

      - name: Levantar servidor
        run: |
          npm start &
          sleep 5

      - name: Instalar K6
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install k6

      - name: Ejecutar K6 con Grafana
        run: |
          K6_PROMETHEUS_RW_SERVER_URL=${{ secrets.GRAFANA_URL }} \
          K6_PROMETHEUS_RW_USERNAME=${{ secrets.GRAFANA_USER }} \
          K6_PROMETHEUS_RW_PASSWORD=${{ secrets.GRAFANA_API_KEY }} \
          k6 run --out experimental-prometheus-rw load-test.js