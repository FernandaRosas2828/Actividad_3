name: K6 Load Test Pipeline

on:
  push:
    branches:
      - master

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Levantar servidor
        run: |
          nohup npm start > server.log 2>&1 &
          sleep 15

      - name: Esperar servidor listo
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health | grep 200; then
              echo "Servidor listo"
              break
            fi
            echo "Esperando servidor..."
            sleep 2
          done

      - name: Instalar K6
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Ejecutar pruebas K6 con Grafana
        run: |
          K6_PROMETHEUS_RW_SERVER_URL=${{ secrets.GRAFANA_URL }} \
          K6_PROMETHEUS_RW_USERNAME=${{ secrets.GRAFANA_USER }} \
          K6_PROMETHEUS_RW_PASSWORD=${{ secrets.GRAFANA_API_KEY }} \
          k6 run --out experimental-prometheus-rw load-test.js

      - name: Ver logs del servidor
        if: always()
        run: cat server.log